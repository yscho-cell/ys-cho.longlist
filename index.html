eArt\":\"속삭이는 말로 예술을 창작하세요\",\"search\":\"검색\",\"artGenerator\":\"예술 생성기\",\"artGeneratorDesc\":\"Monica가 그립니다\"},\"Faq\":{\"faq\":\"자주 묻는 질문\",\"q1\":\"Monica은(는) 무엇인가요?\",\"q2\":\"Monica를 어떻게 사용할 수 있나요?\",\"q3\":\"Monica는 무료인가요?\",\"q4\":\"Monica는 어떻게 작동하나요?\",\"q5\":\"환불을 받을 수 있나요?\",\"a1\":\"Monica는 GPT API로 구동되는 Chrome 확장으로, 간편한 채팅 및 카피라이팅을 위한 개인 AI 어시스턴트로 설계되었습니다.\",\"a2\":\"Cmd+M 또는 Ctrl+M을 누르고 그녀와 대화를 시작하십시오. 또는 Monica에게 웹 페이지에 텍스트를 작성하고 삽입하는 데 도움을 요청하십시오. 80개가 넘는 템플릿 중에서 선택하여 빠르게 마케팅 문구를 생성하십시오. 웹 페이지에서 텍스트를 선택한 후 Monica에게 설명, 번역 또는 다시 정리해 달라고 요청하십시오.\",\"a3\":\"무료로 Monica를 사용할 수 있습니다. 무료 사용자는 일일 사용량 제한이 있습니다. 그러나 고급 기능을 사용하려면 유료 버전으로 업그레이드해야 할 수도 있습니다.\",\"a4\":\"Monica는 GPT API로 구동되는 고급 인공지능 기술을 사용하여 귀하의 채팅 메시지를 이해하고 응답하며, 제공된 템플릿을 기반으로 카피라이팅을 생성합니다. 또한, Monica는 모든 웹페이지의 텍스트를 번역, 재작성 및 설명할 수도 있습니다.\",\"a5\":\"무료 요금제를 제공하여 Monica를 체험해 볼 수 있도록 합니다! 유료 요금제를 등록한 후 환불을 신청하려면, 매월(또는 매년) 갱신 또는 업그레이드 후 72시간 이내에 \u003cmail\u003e$var_mail\u003c/mail\u003e으로 문의해 주시면 최근 결제 금액을 환불해 드리겠습니다. \u003ci\u003e참고: 우리는 연간 결제에 대한 비례 환불을 제공하지 않습니다. 환불 처리에는 5-10 영업일이 소요됩니다.\u003c/i\u003e\"},\"RealUserReviews\":{\"userReviews\":\"전 세계 1천만 명의 사용자들이 신뢰합니다.\",\"reviews\":\"리뷰\",\"onPlatformStore\":\"$$var_platform 스토어\",\"onHuntStore\":\"Product Hunt\",\"users\":\"사용자\",\"UserCommentData\":{\"comment1\":\"이 앱은 우수하고 종합적인 기능을 가지고 있습니다. 정보 제공뿐만 아니라 대안도 제시하고, 질문한 내용의 기본적인 사항들을 설명해 줍니다. 강력 추천합니다!\",\"comment2\":\"AI 기능 외에도 어떤 단어를 선택하면 Monica가 문맥에 맞는 설명을 제공하는 기능이 정말 마음에 듭니다. 학습이나 연구에 뛰어난 도구입니다.\",\"comment3\":\"이 AI 비서는 모든 중요한 정보원과 최고의 봇들을 통합한 완벽한 도구입니다. 모두에게 강력 추천합니다.\",\"comment4\":\"이 앱은 정말 최고로 유용합니다. 저는 매일 사용하고 있으며, 브라우저 확장 프로그램, 데스크탑 애플리케이션, 휴대폰에서도 이용합니다. 모든 기능을 최대한 활용하려면 유료 서비스가 필요하지만, 그만큼의 가치가 있다고 생각합니다.\",\"comment5\":\"Monica는 (하나로 모든 것을) 진정 최고의 선택입니다. 다른 모든 AI를 압도합니다. Monica는 정점에 있습니다. 비할 데 없습니다. 하나로 모든 것을 해결할 수 있습니다.\",\"comment6\":\"이것은 훌륭한 AI입니다. 말 그대로 모든 문제를 해결해줍니다. 가장 좋은 점은 매일 여러 질문을 할 수 있다는 것입니다. 제 경우에는 대학 과제에 정말 많은 도움이 됩니다.\",\"comment7\":\"몇 주 동안 Monica 앱을 사용해왔는데, 이제는 없어서는 안 될 조수가 되었습니다. GPT-4, Bard, Claude와 같은 여러 AI 모델을 한 곳에 통합하여 매우 편리합니다. 이메일 작성, 읽기, 인터넷 검색, 번역, 심지어 이미지 생성까지 다양한 작업에 사용할 수 있습니다. 특히 PDF 파일을 업로드하고 상세 요약을 받을 수 있는 기능이 마음에 듭니다. 음성 입력 기능도 훌륭해서 타이핑하지 않고 AI와 대화할 수 있습니다. 사용자 친화적인 인터페이스, 빠른 응답, 다양한 서비스 지원으로 Monica는 일상 업무에 최고의 선택입니다.\",\"comment8\":\"Monica AI가 정말 좋아요. '설명' 옵션이 있는데, 다른 어떤 플러그인보다 훨씬 뛰어납니다. 이 '설명' 옵션 덕분에 특정 주제에 대해 어떤 단어나 문장을 더 잘 이해할 수 있어요.\",\"comment9\":\"Monica AI에 정말 큰 감사 인사를 전하고 싶어요. 수많은 기능들이 저를 매우 많이 도와줬어요. 대단해요, 전부 다 들었어요 😊👍\",\"comment10\":\"정말 유용해요, 특히 구글 검색을 할 때. 일반 구글 검색보다 빠르고 더 잘 최상의 간단한 정의를 찾아줘요. 학생들에게 강력 추천합니다.\",\"comment11\":\"매일 사용하기에 훌륭한 AI 어시스턴트입니다. 글쓰기, 읽기, 이미지 생성, 분석, 봇 개발 등 모두 가능합니다. 뿐만 아니라 Monica는 다양한 LLM에 접속할 수 있어요. 각 LLM은 각자의 강점과 약점이 있기 때문입니다.\",\"comment12\":\"정말 멋져요, 제가 가장 좋아하는 AI에요. 거의 1년 동안 사용했지만, 정보를 얻으려는 게 아니라 그냥 재미로 사용합니다! 어쩌면 이게 제 가장 좋아하는 '가상 친구'인 것 같아요.\",\"comment13\":\"Monica는 대단한 AI 비서로, 박사 학위를 가진 천재 절친이 당신의 브라우저에 설치된 것 같아요. 그녀는 방사학에서 부동산까지 다양한 분야에서 지식 폭탄을 던지며 농담을 하고, 귀여운 아기 말투로 당신을 즐겁게 해줘요.\",\"comment14\":\"이건 정말 강력해요, 그리고 계속 업데이트 중이에요. 제가 사용해본 AI 중 가장 인상적이에요. 예를 들어, 기술 차트 분석, 역 컵과 핸들 패턴과 같은 것들도 Monica가 분석할 수 있어요! 너무 강력해서 말이 안 나와요!\",\"comment15\":\"모니카를 사용하는 것이 아주 편리해요. 리뷰를 작성하는 것이 불필요하다고 생각할 정도로, 별 다섯 개가 모든 것을 말해줍니다. 저에게 가장 중요한 것은 무료라는 점입니다. 전문성, 정확성, 속도 모두 훌륭해요.\",\"comment16\":\"별을 더 줄 수 있다면? 열 개 별을 주고 싶어요! 모니카는 정말 대단해요. 버튼 하나만 누르면 모니카를 만날 수 있다는 사실 덕분에 편안히 잠들 수 있어요! 너무 강력해요!!!\",\"comment17\":\"생산성 향상에 대해서는 말할 필요도 없어요. 별 다섯 개로 충분합니다 \u003c3. 존재해줘서 고마워요!\",\"comment18\":\"다섯 개 이상의 별을 줄 수 있다면 주고 싶습니다. 당신 덕분에 제 인생이 완전히 바뀌었어요. 너무 사랑해요, 모니카, 당신은 내 영혼의 동반자입니다.\",\"comment19\":\"AI와 다기능 챗봇이 필요하신 분들은 꼭 이 확장 프로그램을 구글에 추가하세요. 비록 구글에서만 작동하지만, 구글에서 열려 있는 다른 애플리케이션의 화면도 캡처하여 AI에게 질문할 수 있습니다. 질문하기, 이미지 생성, 동영상, 웹사이트, PDF 파일 요약(업로드하여 요약 가능), 텍스트 번역, 화면 캡처 후 직접 질문하기 등 정말 만능이에요 :))) 이걸 찾게 되어 정말 유용했어요. 모두에게 추천합니다.\",\"comment20\":\"저는 AI 애호가로 다양한 도구를 탐구하는 것을 좋아합니다. Monica는 제가 처음 접한 도구 중 하나였고, 여전히 가장 좋아하는 도구입니다. 훌륭한 제품이며 자주 고급 기능들이 출시됩니다.\"}},\"MoreTools\":{\"title\":\"\u003cspan\u003e더 많 한 형태의 비요청 통신, 오도하는 마케팅 및 모든 형태의 유료 광고가 포함됩니다. 모든 홍보 활동은 법적 요구 사항을 준수하며, 당사의 서비스에 대해 명확하고 정직한 정보를 제공해야 합니다.\",\"q8\":\"수익이나 추천 성과를 어떻게 추적할 수 있나요?\",\"a8\":\"Tapffiliate 대시보드를 통해 수익과 추천 성과를 추적할 수 있습니다. 이 플랫폼은 클릭, 전환 및 수익에 대한 실시간 통찰력을 제공합니다.\",\"q9\":\"회원 프로그램에 신청할 수 있는 사람은 누구인가요?\",\"a9\":\"우리의 계열사 프로그램은 우리 제품을 홍보하고 싶은 모든 사람들에게 열려 있습니다. 콘텐츠 크리에이터, 블로거 및 디지털 마케터를 포함하여 관련 대상 청중을 보유한 분들을 특히 환영합니다.\",\"q10\":\"쿠키 유효 기간은 어떻게 되나요?\",\"a10\":\"우리는 관대한 45일의 쿠키 기간을 제공하여 수수료를 벌 수 있는 충분한 시간과 유연성을 제공합니다.\",\"q11\":\"계열사 프로그램에 가입하는 데 비용이 발생하나요?\",\"a11\":\"아니요, 우리의 계열사 프로그램에 가입하는 데 비용은 없습니다. 가입은 완전히 무료이며 숨겨진 수수료나 계열사 자격을 유지하기 위한 요구 사항도 없습니다.\",\"q12\":\"사용자가 APP에서 구매할 경우 커미션이 적용되나요?\",\"a12\":\"물론입니다! 저희 시스템은 Google Play 스토어와 Apple App Store 생태계 전반에 걸쳐 앱 내 구매에 대한 포괄적인 추적 지원을 제공합니다. 사용자가 모바일 애플리케이션을 통해 구매할 때, 이러한 거래는 자동으로 추적되고 커미션으로 적립되며, 웹사이트 구매와 마찬가지로 원활하게 작동합니다. 이 통합은 두 플랫폼의 모든 결제 방법을 포함하여, 추천 사용자가 어떤 방식으로 구매를 완료하든지 상관없이 정당한 커미션을 받을 수 있도록 보장합니다.\",\"q13\":\"모바일 앱 구매에 대한 커미션은 어떻게 계산되나요?\",\"a13\":\"우리의 모바일 앱(Google Play 스토어 및 Apple App Store)을 통해 구매한 경우, 플랫폼 수수료로 인해 웹사이트 구매와는 다른 방식으로 커미션이 계산됩니다. 계산은 해당 플랜의 USD 가격을 기준으로 하며, 모바일 수익은 총 구매 금액의 70%로 계산되어 플랫폼 수수료를 반영합니다. \u003cbr\u003e\u003c/br\u003e 예를 들어, 사용자가 모바일 앱을 통해 100달러를 구매하면, 커미션은 70달러를 기준으로 계산됩니다. 플랫폼 수수료와 환율 변동으로 인해 프로모션 가격이나 지역 가격이 적용될 때 실제 커미션 금액이 약간 다를 수 있음을 유의하세요.\",\"startEarningNow\":\"지금 바로 제휴 프로그램을 통해 수익을 창출하세요\",\"getFirstPaid\":\"지금 첫 번째로 지급받으세요\",\"commentTitle\":\"우리를 위해 다른 사람들이 만들어주는 것\"},\"ProfilePage\":{\"profileTitle\":\"계정 - Monica\",\"billingTitle\":\"요금제 및 결제 관리 - Monica\",\"membershipTitle\":\"선물세트 - Monica\",\"ProfileView\":{\"account\":\"계정\",\"title\":\"계정 설정\",\"basicInformation\":\"기본 정보\",\"edit\":\"편집\",\"change\":\"변경\",\"setPassword\":\"비밀번호 설정\",\"link\":\"연결\",\"profile\":\"프로필\",\"email\":\"이메일\",\"userId\":\"사용자 ID\",\"emailTip\":\"이메일을 변경하기 전에 비밀번호를 설정하세요\",\"emailNotExistTip\":\"이메일 계정을 연결하여 이메일 로그인을 활성화하세요.\",\"password\":\"비밀번호\",\"passwordTip\":\"비밀번호 로그인을 활성화하려면 비밀번호를 설정하세요\",\"linkedAc \",\"title1\":\"투표하고 잠금 해제\",\"title2\":\"GPT o1, GPT-4o 및 Claude 3.5 무료 이용!\"},\"CampusActiveRule\":{\"title\":\"Monica.im 캠퍼스 투표 프로그램 약관\",\"updateTime\":\"최종 업데이트: 2024년 9월 10일\",\"desc\":\"Monica.im 캠퍼스 투표 프로그램(이하 '프로그램')에 오신 것을 환영합니다. 프로그램에 참여함으로써 귀하는 본 약관에 동의하는 것으로 간주됩니다. 동의하지 않으시면 프로그램에 참여하지 마십시오.\",\"title1\":\"1. 자격\",\"desc1\":\"이 프로그램은 Monica.im에 등록된 사용자에게만 열려 있습니다.\",\"desc2\":\"Monica.im 데이터베이스에 등록된 학교의 학생들만 보상을 받을 자격이 있습니다.\",\"desc3\":\"보상을 받으려면 학생 신분이 확인되어야 합니다.\",\"title2\":\"2. 프로그램 세부사항\",\"desc4\":\"본 프로그램은 2024년 9월 12일부터 2024년 10월 26일까지 진행됩니다 (\\\"프로그램 기간\\\").\",\"desc5\":\"Monica.im 데이터베이스에 등록된 학교의 학생들만 보상을 받을 자격이 있습니다.\",\"desc6\":\"Monica.im은 프로그램 기간을 연장하거나 단축할 권리를 보유합니다.\",\"title3\":\"3. 투표 절차\",\"desc7\":\"Monica.im에 등록된 모든 사용자가 투표할 수 있습니다.\",\"desc8\":\"사용자는 프로그램 기간 동안 단 한 번만 투표할 수 있습니다.\",\"desc9\":\"Monica.im은 부정한 수단을 통해 얻은 것으로 간주되는 투표를 삭제할 권리를 보유합니다.\",\"title4\":\"4. 보상\",\"desc10\":\"보상은 Monica.im Pro 멤버십 기간입니다.\",\"desc11\":\"보상을 받기 위해 사용자는 유효한 학교 이메일 주소를 제공해야 합니다.\",\"desc12\":\"Pro 멤버십 혜택은 표준 Pro 버전 제한을 받습니다.\",\"desc13\":\"Monica.im은 학교마다 다른 투표 기준을 설정할 수 있습니다.\",\"desc14\":\"Monica.im은 필요에 따라 보상 기간과 투표 기준을 조정할 권리를 보유합니다.\",\"title5\":\"5. 제한사항\",\"desc15\":\"허위 학교 이메일 주소 사용 시 수여된 Pro 회원 기간이 즉시 취소됩니다.\",\"desc16\":\"Monica.im은 본 약관을 위반하거나 부정행위를 하는 참여자를 실격시킬 권리를 보유합니다.\",\"title6\":\"6. 프로그램 변경\",\"desc17\":\"Monica.im은 사전 통지 없이 언제든지 프로그램을 수정, 중단 또는 종료할 권리를 보유합니다.\",\"title7\":\"7. 개인정보 보호\",\"desc18\":\"제공된 개인 정보는 Monica.im의 개인정보 보호정책에 따라 프로그램 관리 및 보상 분배 목적으로만 사용됩니다.\",\"title8\":\"8. 책임의 제한\",\"desc19\":\"Monica.im은 프로그램 참여에 영향을 미칠 수 있는 기술적 문제, 오류 또는 기타 문제에 대해 책임을 지지 않습니다.\",\"footer\":\"Monica.im 캠퍼스 투표 프로그램에 참여함으로써 귀하는 이 약관을 읽고 이해하며 동의했음을 인정합니다. 질문이나 우려 사항이 있으면 contact@monica.im으로 문의하십시오.\"},\"CampusScene\":{\"title\":\"당신의 만능 디지털 멘토\",\"sceneTitle1\":\"학업을 가속화하세요\",\"sceneTitle2\":\"취업 전망을 높이세요\",\"sceneDesc1\":\"논문 요약하기\",\"sceneDesc2\":\"YouTube 동영상 요약하기\",\"sceneDesc3\":\"인용 및 참고 문헌 생성\",\"sceneDesc4\":\"문헌 검토 보고서 작성\",\"s 하여 팀이 항상 최신 정보와 시장 통찰력을 얻을 수 있도록 합니다.\",\"intelligentImageGeneration\":\"지능형 이미지 생성\",\"intelligentImageGenerationTips\":\"팀의 아이디어를 시각화하여 마케팅 및 브랜드 홍보를 지원합니다.\",\"programmingAssistant\":\"프로그래밍 어시스턴트\",\"programmingAssistantTips\":\"개발 팀을 위한 코드 최적화 제안 및 코드 스니펫 생성을 제공하여 개발 효율성을 향상시킵니다.\",\"multiLanguageSupport\":\"다국어 지원\",\"multiLanguageSupportTips\":\"번역 및 몰입형 이중 언어 읽기를 지원하여 팀이 글로벌 시장에서 원활하게 소통할 수 있도록 돕습니다.\",\"teamFeatures\":\"팀을 위한 기능\",\"memberManage\":\"멤버 관리\",\"memberManageDesc\":\"멤버 초대 및 승인, 팀 멤버와 역할 할당을 쉽게 관리합니다. 관리자는 각 멤버에게 맞춤형 권한 및 사용 시나리오를 설정하여 명확한 업무 분담을 보장할 수 있습니다.\",\"usage\":\"사용량 추적\",\"usageDesc\":\"팀 구성원의 AI 사용을 실시간으로 모니터링하여 기업이 AI 자원을 합리적으로 배분하고 자원 낭비를 방지할 수 있도록 돕습니다. 관리자는 상세 보고서를 확인하여 팀 워크플로우를 최적화할 수 있습니다.\",\"billing\":\"청구 관리\",\"billingDesc\":\"청구서 결제 및 관리 프로세스를 간소화합니다. 관리자는 팀 결제를 중앙에서 관리하고, 월별/연간 청구서와 상세 사용 내역을 확인하여 예산 투명성을 보장할 수 있습니다.\",\"teamManage\":\"팀 관리\",\"teamManageDesc\":\"관리자는 팀 이름과 아바타를 포함한 팀 설정을 맞춤화하고, 팀을 잠그거나 해체할 수 있습니다.\",\"multiPlatform\":\"언제 어디서나 팀 협업\",\"multiPlatformDesc\":\"Chrome, Edge 또는 우리의 APP에서 팀 구성원은 언제 어디서나 Monica에 접근하고 사용할 수 있습니다.\",\"faq1Title\":\"Monica 팀 에디션과 개인 에디션의 차이점은 무엇인가요?\",\"faq1Desc\":\"Monica 팀 에디션은 개인 에디션에 팀 관리 기능을 추가하여 팀원 관리, 사용량 추적, 청구 관리 및 공유 설정을 포함하여 팀이 AI 도구를 보다 효율적으로 사용할 수 있도록 돕습니다.\",\"faq2Title\":\"Monica 팀 에디션의 비용은 얼마입니까?\",\"faq2Desc\":\"Monica 팀 에디션은 팀 규모에 따라 유연한 가격 계획을 제공합니다. 구체적인 가격은 팀원 수와 사용되는 AI 도구에 따라 달라집니다. 자세한 내용은 가격 페이지를 참조하십시오.\",\"faq3Title\":\"팀원을 어떻게 관리하나요?\",\"faq3Desc\":\"관리자는 팀 제어 패널을 통해 멤버를 추가하거나 제거하고, 역할을 할당하며, 멤버 권한을 설정하여 각 멤버가 적절한 도구와 권한을 갖도록 할 수 있습니다.\",\"faq4Title\":\"왜 Monica for Teams가 GPT Teams의 최고의 대안인가요?\",\"faq4Desc\":\"Monica for Teams는 여러 프리미엄 AI 모델을 통합하고, 멤버 관리, 사용량 추적, 청구 관리 등 포괄적인 팀 협업 기능을 제공합니다. 또한 실시간 데이터 접근 및 전문 이미지 생성과 같은 독특한 기능을 제공하여 팀을 위한 보다 완전한 AI 솔루션을 제공합니다.\",\"footerBannerTitle\":\"팀의 잠재력을 발휘하세요\",\"footerBannerDesc\":\"팀에 합류하여 전례 없는 팀 협업 효율성 향상을 경험하세요!\"},\"TeamInvitationPage\":{\"pageTitle\":\"초대 - Monica\",\"errorTitle\":\"죄송합니다, 팀에 가입할 수 없습니다\ 03e GPT-4o \u0026 Claude-3.5 / 초대\",\"invitationProcess\":\"초대 과정\",\"invitationProcessStep1\":\"QR 코드나 링크를 통해 친구를 추천하세요.\",\"invitationProcessStep2\":\"친구가 계정을 등록합니다.\",\"invitationProcessStep3\":\"친구가 Monica에 로그인하거나 IM 계정을 연결하면, 양쪽 모두 보상을 받습니다!\",\"rewardRecord\":\"보상 기록\",\"unlimited\":\"무제한\",\"friendCount\":\"$$var_count 명의 친구\",\"registrationTime\":\"등록 시간\"},\"Code\":{\"title\":\"Monica Code: Claude 3.5 Sonnet/GPT-4o 기반 AI 코드 생성기\",\"description\":\"Monica Code: 자연어로부터 코드를 생성하는 VSCode 및 JetBrains 확장 프로그램입니다. 필요 사항을 설명하기만 하면 AI가 Python, Java, C++, HTML, JavaScript 등으로 마법처럼 코딩합니다. GPT-4o 및 Claude 3.5 Sonnet 모델을 통합했습니다. GitHub Copilot 및 Cursor의 대안입니다.\",\"faqTitle1\":\"빠른/느린 고급 쿼리는 무엇인가요?\",\"faqContent1\":\"코드 완성을 제외한 모든 AI 기능은 고급 쿼리를 소모합니다. 빠른 고급 쿼리는 더 빠른 응답 시간을 제공하며 서비스 피크 시간대에도 사용 가능합니다. 느린 고급 쿼리는 피크 시간대에 속도와 가용성이 감소할 수 있습니다.\u003cbr\u003e\u003c/br\u003e무료 사용자는 매일 8회의 느린 고급 쿼리를 사용할 수 있으며, 쿼리 수는 매일 자정에 초기화됩니다.\u003cbr\u003e\u003c/br\u003e프리미엄 사용자는 매월 500회의 빠른 고급 쿼리를 사용할 수 있으며, 빠른 고급 쿼리를 모두 소진한 후에는 무제한으로 느린 고급 쿼리를 사용할 수 있습니다. 프리미엄 사용자의 빠른 쿼리 수는 매월 1일에 초기화됩니다.\",\"faqTitle2\":\"추가 질문은 어디에서 할 수 있나요?\",\"faqContent2\":\"\u003cemail\u003econtact@monica.im\u003c/email\u003e로 이메일을 보내주시면 기꺼이 답변해 드리겠습니다.\",\"faqTitle3\":\"Monica Code에서 생성된 코드는 누구의 것인가요?\",\"faqContent3\":\"당신의 것입니다! 생성된 모든 코드는 당신의 것이며, 상업적으로도 자유롭게 사용할 수 있습니다.\",\"faqTitle4\":\"Monica Code가 코딩에 능숙한 AI를 지원하나요?\",\"faqContent4\":\"Monica Code는 GPT-4o 및 Claude 3.5 Sonnet과 같은 가장 강력한 모델을 지원하며, 이 모델들은 코드 생성뿐만 아니라 디버깅 및 코드 설명에도 도움을 줍니다. Monica Code는 C++, Go, Java, JavaScript, Python 등 20개 이상의 프로그래밍 언어를 다룰 수 있습니다.\",\"faqTitle5\":\"최고의 코드 생성 AI는 무엇인가요?\",\"faqContent5\":\"최고의 코드 생성 AI는 GPT-4o 및 Claude 3.5 Sonnet과 같은 첨단 모델을 활용하여 정확하고 효율적이며 다기능의 코딩 솔루션을 제공합니다. Monica Code는 이러한 최첨단 AI 모델을 VSCode와 통합하여 다양한 프로그래밍 언어를 지원하며 자연어 설명에서 직접 코드를 무결하게 생성해줍니다. 이는 신뢰할 수 있고 강력한 AI 기반 코딩 어시스턴트를 찾는 개발자들에게 Monica Code가 최상의 선택이 되게 합니다.\",\"faqTitle6\":\"Monica Code는 C++, Go, Java, JavaScript, Python 등의 언어로 코드를 생성할 수 있나요?\",\"faqCo nyName3\":\"아마존\",\"prompt\":\"*다음 직원 수를 기준으로 회사 규모가 큰지 작은지 판단하십시오:\\n\\n[직원 수]\\n\\n기준:\\n- 1-50명: 소규모 회사\\n- 51-250명: 중소규모 회사\\n- 251-1000명: 중규모 회사\\n- 1001-5000명: 대규모 회사\\n- 5000명 이상: 초대형 회사\"},\"leadGenerationTitle\":\"영업 리드 목록\",\"leadGeneration\":{\"contactName\":\"연락처 이름\",\"linkedInURL\":\"LinkedIn URL\",\"companyName\":\"회사 이름\",\"industry\":\"산업\",\"location\":\"위치\"},\"meetingSummaryTitle\":\"회의 요약\",\"meetingSummary\":{\"meetingMinutes\":\"회의록\",\"attendees\":\"참석자\",\"actionItems\":\"조치 항목\",\"meetingMinutes1\":\"Alice는 Monica의 최근 제품 진행 상황을 보고하며, 지난 분기 동안 사용자 증가율이 20% 상승했다고 언급했습니다. 이는 주로 새로운 기능 출시와 사용자 경험 개선 덕분입니다. 새로 추가된 스마트 작업 관리 모듈은 사용자들로부터 긍정적인 피드백을 받았으며, 사용자 유지율이 눈에 띄게 향상되었습니다. Clara는 신규 사용자들의 학습 곡선을 줄이기 위해 사용자 온보딩 프로세스를 추가로 최적화할 것을 제안했습니다. Bob은 내부 팀의 효율성을 높이기 위해 기술적 수단을 통해 백엔드 데이터 분석을 단순화할 것을 제안했습니다.\",\"meetingMinutes2\":\"Bob은 이어서 팀이 여전히 일부 데이터 처리를 위해 Excel에 의존하고 있어 효율성과 확장성이 제한된다고 지적했습니다. 그는 Monica를 기반으로 한 내부 자동화 도구를 개발하여 Excel을 완전히 대체하고 데이터 분석 및 작업 관리를 수행할 것을 제안했습니다. Alice는 이에 동의하며, 다부서 협업을 지원하는 기능 개발을 우선시할 것을 권장했습니다.\",\"meetingMinutes3\":\"Bob은 Google Sheets를 대체하여 데이터 보안과 운영 효율성을 높이기 위해 더 강력하고 안전한 내부 협업 시스템을 구축할 것을 제안했습니다. 그는 이것이 기능을 향상시킬 뿐만 아니라 외부 플랫폼에 대한 의존도를 줄일 것이라고 강조했습니다. Clara는 내부 협업 도구의 사용 용이성과 학습 곡선의 중요성을 강조하며, 개발 과정에서 사용자 경험 디자인을 우선시해야 한다고 제안했습니다.\",\"meetingMinutes4\":\"Bob은 Monica 내에서 AI 기술을 완전히 채택하는 방향으로 AI 통합을 제안하며, 데이터 분석, 자동화된 사용자 지원, 내부 팀 커뮤니케이션 기능을 포함한 AI 기술의 전면적인 도입을 제안했습니다. 그는 일상적인 워크플로우를 지원하기 위한 내부 AI 비서를 개발할 것을 제안했습니다. Alice는 이 방향을 지지하면서 개발 자원의 적절한 할당을 보장하기 위해 명확한 우선순위를 설정해야 한다고 언급했습니다.\",\"meetingMinutes5\":\"Clara는 최근 시장 피드백 데이터를 공유하며, Monica의 핵심 기능에 대한 사용자 만족도가 높지만 고급 기능에 대한 인지도가 낮다는 점을 지적했습니다. 그녀는 온라인 이벤트와 소셜 미디어 홍보를 통해 Monica의 고급 기능에 대한 사용자 인지도와 사용률을 높일 것을 제안했습니다. Alice는 사용자 사례를 포함한 더 직관적인 기능 시연 영상을 제작하여 마케팅 목적으로 사용할 것을 제안했습니다.\",\"meetingMinutes6\":\"마지막으로, 회의에서는 단기 기술 최적화 및 마케팅 홍보 방향을 설정하고, 내부 효율성 향상과 사용자 경험 최적화에 중점을 두기로 했습니다. Bob은 Excel 및 Google Sheets를 대체할 도구 개발 요구 사항을 평가하고 기술 타당성 보고서를 제출할 책임이 있습니다. Clara는 온라인 홍보 활동을 계획하고 기능 시연 영상을 제작할 책임이 있으며, Alice는 제품 팀을 이끌고 신규 사용자 온보딩 프로세스를 최적화할 것입니다. 각 부서는 계획에 따라 진행하고 다음 회의에서 진행 상황을 보고할 것입니다.\",\"attendeesPrompt\":\"*다음 회의록에서 모든 참석자의 이름을 추출하십시오:\\n\\n[회의록]\\n\\n요구사항:\\n1. 명시적으로 언급된 모든 참석자 나열\\n2. 주최자, 발표자 및 언급된 사람 포함\\n3. 중복된 이름 제거\\n4. 약어나 별명이 있을 경우 가능한 한 전체 이름 제공\",\"actionItemsPrompt1\":\"\\\"*다음 회의록에서 모든 실행 항목을 추출하고 요약하십시오:\\n\",\"actionItemsPrompt2\":\"\\\"\\n요구사항:\\n1. 명확한 작업 및 실행 항목 모두 나열\\n2. 책임자 포함 (언급된 경우)\\n3. 마감일 기재 (언급된 경우)\\n4. 우선순위 또는 시간 순서로 정렬 (판단 가능한 경우)\\n5. 간결한 목록 형식으로 제시\"},\"batchJdCreatorTitle\":\"채용 요구사항\",\"batchJdCreator\":{\"positionTitle\":\"직위명\",\"jobLevel\":\"직급\",\"location\":\"근무지\",\"experienceYears\":\"경력 연수\",\"positionOverview\":\"직무 개요\",\"responsibilities\":\"직무 책임\",\"detailedRequirements\":\"세부 요구사항\",\"positionOverviewPrompt1\":\"*다음 직책을 기반으로, 직무의 주요 기능, 회사 내 역할 및 회사에 대한 중요성을 포함한 간결하고 포괄적인 직무 개요를 생성하십시오:\\n\",\"positionOverviewPrompt2\":\"\\n직무 개요는 다음을 포함해야 합니다:\\n1. 직무의 주요 책임을 간략히 설명\\n2. 회사나 팀 내에서 이 직무의 역할 설명\\n3. 회사 운영이나 목표에 대한 이 직무의 중요성 강조\\n4. 전문적이면서도 이해하기 쉬운 언어 사용\\n5. 길이는 200-250단어 사이로 유지\",\"responsibilitiesPrompt1\":\"*다음 직무 제목을 기반으로, 주요 직무 책임을 나열하세요. 목록은 이 직위의 일상 업무 내용과 주요 과제를 포괄적으로 다루어야 합니다:\\n\",\"responsibilitiesPrompt2\":\"\\n직무 책임을 작성할 때 주의사항:\\n1. 동사로 시작하여 각 책임을 명확히 설명\\n2. 일상 업무와 장기 책임 포함\\n3. 팀 협업 및 의사소통 관련 책임 강조\\n4. 해당되는 경우, 관리 또는 리더십 책임 포함\\n5. 주요 책임 5-8개 나열\\n6. 중요도나 빈도 순으로 정렬\\n7. 간결하고 전문적인 언어 사용\",\"detailedRequirementsPrompt1\":\"*다음 직책을 기준으로, 이 직책에 대한 요구 사항을 자세히 나열해 주세요. 필요한 자격, 기술, 경험 및 개인적 특성을 포함하여:\\n\",\"detailedRequirementsPrompt2\":\"\\n상세 요구 사항을 작성할 때 다음 측면을 고려해 주세요:\\n1. 교육 배경 요구 사항 (학위, 전공 등)\\n2. 경력 요구 사항 (연수, 관련 산업 경험 등)\\n3. 필수 기술 또는 전문 지식\\n4. 소프트 스킬 요구 사항 (예: 의사소통 능력, 팀워크 등)\\n5. 언어 능력 요구 사항 (예: 한국어, 영어 등)\\n6. 관련 자격증 또는 인증서\\n7. 개인적 특성 또는 성격 특성\\n8. 해당되는 경우, 신체적 또는 기타 특별 요구 사항 포함\\n\\n요구 사항을 \\\"필수 조건\\\"과 \\\"우대 조건\\\"으로 나누고, 각 요구 사항을 명확하고 간결한 언어로 설명해 주세요.\",\"positionTitle1\":\"소프트웨어 엔지니어\",\"jobLevel1\":\"시니어\",\"location1\":\"샌프란시스코, 캘리포니아\",\"experienceYears1\":\"5-7년\",\"positionTitle2\":\"제품 마케팅 매니저\",\"jobLevel2\":\"리드\",\"location2\":\"뉴욕, 뉴욕\",\"experienceYears2\":\"6-8년\",\"positionTitle3\":\"비즈니스 운영 분석가\",\"jobLevel3\":\"선임\",\"location3\":\"시애틀, 워싱턴\",\"experienceYears3\":\"3-5년\"},\"userFeedbackClassificationTitle\":\"피드백 분류\",\"userFeedbackClassification\":{\"date\":\"날짜\",\"userID\":\"사용자 ID\",\"feedbackContent\":\"피드백 내용\",\"translate\":\"번역\",\"category\":\"카테고리\",\"categoryPrompt\":\"다음 고객 피드백을 가장 적절한 카테고리로 분류하세요:\\n1. 제품 품질\\n2. 고객 서비스\\n3. 물류 및 배송\\n4. 웹사이트/앱 문제\\n5. 가격 및 프로모션\\n6. 사용자 경험\\n\\n각 피드백에 대해 하나의 주요 카테고리만 선택하세요.\",\"feedbackContent1\":\"최근에 구매한 Model X Pro 헤드폰이 오른쪽 귀에서 15-20분마다 연결이 끊깁니다.\",\"feedbackContent2\":\"고객 서비스의 Sarah는 정말 대단해요! 제 주문이 세관에 걸렸는데, 그녀가 추적을 도와주고 무료로 배송을 신속하게 처리해 주었습니다. 앞으로도 계속 지원할 것입니다!\",\"feedbackContent3\":\"299달러짜리 진짜 가죽 가방이 긁힘과 끊어진 끈과 함께 도착했습니다. 3일 전에 고객 서비스에 사진을 보냈지만 아직 응답이 없습니다. 이런 고급 제품은 정말 실망스럽습니다.\",\"feedbackContent4\":\"커피머신을 두 달 동안 사용했는데, 커피는 향이 좋지만 물탱크 바닥에서 물이 새기 시작했습니다. 게다가 필터 보충팩이 한 상자에 4.99달러로 너무 비쌉니다.\",\"feedbackContent5\":\"휴일 세트를 사고 싶은데, 신용카드 정보를 입력한 후 결제 페이지가 멈춥니다. Chrome과 Safari 브라우저 모두 시도했지만 여전히 같습니다. 블랙 프라이데이 할인 혜택을 놓치게 생겼어요!\"}},\"mainNavController\":{\"agent\":\"에이전트\",\"chat\":\"채팅\",\"discover\":\"발견\",\"bot\":\"봇\",\"read\":\"읽기\",\"search\":\"검색\",\"write\":\"쓰기\",\"translate\":\"번역\",\"art\":\"이미지\",\"toolkit\":\"도구 모음\",\"memo\":\"메모\",\"image\":\"이미지\",\"video\":\"비디오\",\"audio\":\"오디오\"},\"teamController\":{\"monthly\":\"팀 플랜 - 월간\",\"annually\":\"팀 플랜 - 연간\"},\"userController\":{\"noQueriesQuota\":\"귀하의 쿼리를 모두 사용하였습니다\",\"noReadingQuota\":\"독서 보조 기능의 무료 한도에 도달하였습니다. 지금 업그레이드하여 계속해서 기사를 읽는 즐거움을 누려보세요!\",\"noWebSearchQuota\":\"스마트 검색의 무료 한도에 도달하였습니다. 지금 업그레이드하여 스마트 검색을 계속해서 즐기세요!\",\"noVideoSummaryQuota\":\"비디오 요약의 무료 한도에 도달하였습니다. 지금 업그레이드하여 비디오를 요약하는 즐거움을 계속하세요!\",\"loginRequired\":\"이 기능을 사용하려면 로그인해주세요\",\"installRequired\":\"귀하의 쿼리를 모두 사용하였습니다. Monica를 설치하고 하루 30회의 무료 쿼리를 받아보세요\",\"noDocChatSummaryQuota\":\"문서 채팅의 무료 한도에 도달했습니다. ,\"artGeneratorDesc\":\"Monica가 그립니다\"},\"Faq\":{\"faq\":\"자주 묻는 질문\",\"q1\":\"Monica은(는) 무엇인가요?\",\"q2\":\"Monica를 어떻게 사용할 수 있나요?\",\"q3\":\"Monica는 무료인가요?\",\"q4\":\"Monica는 어떻게 작동하나요?\",\"q5\":\"환불을 받을 수 있나요?\",\"a1\":\"Monica는 GPT API로 구동되는 Chrome 확장으로, 간편한 채팅 및 카피라이팅을 위한 개인 AI 어시스턴트로 설계되었습니다.\",\"a2\":\"Cmd+M 또는 Ctrl+M을 누르고 그녀와 대화를 시작하십시오. 또는 Monica에게 웹 페이지에 텍스트를 작성하고 삽입하는 데 도움을 요청하십시오. 80개가 넘는 템플릿 중에서 선택하여 빠르게 마케팅 문구를 생성하십시오. 웹 페이지에서 텍스트를 선택한 후 Monica에게 설명, 번역 또는 다시 정리해 달라고 요청하십시오.\",\"a3\":\"무료로 Monica를 사용할 수 있습니다. 무료 사용자는 일일 사용량 제한이 있습니다. 그러나 고급 기능을 사용하려면 유료 버전으로 업그레이드해야 할 수도 있습니다.\",\"a4\":\"Monica는 GPT API로 구동되는 고급 인공지능 기술을 사용하여 귀하의 채팅 메시지를 이해하고 응답하며, 제공된 템플릿을 기반으로 카피라이팅을 생성합니다. 또한, Monica는 모든 웹페이지의 텍스트를 번역, 재작성 및 설명할 수도 있습니다.\",\"a5\":\"무료 요금제를 제공하여 Monica를 체험해 볼 수 있도록 합니다! 유료 요금제를 등록한 후 환불을 신청하려면, 매월(또는 매년) 갱신 또는 업그레이드 후 72시간 이내에 \u003cmail\u003e$var_mail\u003c/mail\u003e으로 문의해 주시면 최근 결제 금액을 환불해 드리겠습니다. \u003ci\u003e참고: 우리는 연간 결제에 대한 비례 환불을 제공하지 않습니다. 환불 처리에는 5-10 영업일이 소요됩니다.\u003c/i\u003e\"},\"RealUserReviews\":{\"userReviews\":\"전 세계 1천만 명의 사용자들이 신뢰합니다.\",\"reviews\":\"리뷰\",\"onPlatformStore\":\"$$var_platform 스토어\",\"onHuntStore\":\"Product Hunt\",\"users\":\"사용자\",\"UserCommentData\":{\"comment1\":\"이 앱은 우수하고 종합적인 기능을 가지고 있습니다. 정보 제공뿐만 아니라 대안도 제시하고, 질문한 내용의 기본적인 사항들을 설명해 줍니다. 강력 추천합니다!\",\"comment2\":\"AI 기능 외에도 어떤 단어를 선택하면 Monica가 문맥에 맞는 설명을 제공하는 기능이 정말 마음에 듭니다. 학습이나 연구에 뛰어난 도구입니다.\",\"comment3\":\"이 AI 비서는 모든 중요한 정보원과 최고의 봇들을 통합한 완벽한 도구입니다. 모두에게 강력 추천합니다.\",\"comment4\":\"이 앱은 정말 최고로 유용합니다. 저는 매일 사용하고 있으며, 브라우저 확장 프로그램, 데스크탑 애플리케이션, 휴대폰에서도 이용합니다. 모든 기능을 최대한 활용하려면 유료 서비스가 필요하지만, 그만큼의 가치가 있다고 생각합니다.\",\"comment5\":\"Monica는 (하나로 모든 것을) 진정 최고의 선택입니다. 다른 모든 AI를 압도합니다. Monica는 정점에 있습니다. 비할 데 없습니다. 하나로 모든 것을 해결할 수 있습니다.\",\"comment6\":\"이것은 훌륭한 AI입니다. 말 그대로 모든 문제를 해결해줍니다. 가장 좋은 점은 매일 여러 질문을 할 수 있다는 것입니다. 제 경우에는 대학 과제에 정말 많은 도움이 됩니다.\",\"comment7\":\"몇 주 동안 Monica 앱을 사용해왔는데, 이제는 없어서는 안 될 조수가 되었습니다. GPT-4, Bard, Claude와 같은 여러 AI 모델을 한 곳에 통합하여 매우 편리합니다. 이메일 작성, 읽기, 인터넷 검색, 번역, 심지어 이미지 생성까지 다양한 작업에 사용할 수 있습니다. 특히 PDF 파일을 업로드하고 상세 요약을 받을 수 있는 기능이 마음에 듭니다. 음성 입력 기능도 훌륭해서 타이핑하지 않고 AI와 대화할 수 있습니다. 사용자 친화적인 인터페이스, 빠른 응답, 다양한 서비스 지원으로 Monica는 일상 업무에 최고의 선택입니다.\",\"comment8\":\"Monica AI가 정말 좋아요. '설명' 옵션이 있는데, 다른 어떤 플러그인보다 훨씬 뛰어납니다. 이 '설명' 옵션 덕분에 특정 주제에 대해 어떤 단어나 문장을 더 잘 이해할 수 있어요.\",\"comment9\":\"Monica AI에 정말 큰 감사 인사를 전하고 싶어요. 수많은 기능들이 저를 매우 많이 도와줬어요. 대단해요, 전부 다 들었어요 😊👍\",\"comment10\":\"정말 유용해요, 특히 구글 검색을 할 때. 일반 구글 검색보다 빠르고 더 잘 최상의 간단한 정의를 찾아줘요. 학생들에게 강력 추천합니다.\",\"comment11\":\"매일 사용하기에 훌륭한 AI 어시스턴트입니다. 글쓰기, 읽기, 이미지 생성, 분석, 봇 개발 등 모두 가능합니다. 뿐만 아니라 Monica는 다양한 LLM에 접속할 수 있어요. 각 LLM은 각자의 강점과 약점이 있기 때문입니다.\",\"comment12\":\"정말 멋져요, 제가 가장 좋아하는 AI에요. 거의 1년 동안 사용했지만, 정보를 얻으려는 게 아니라 그냥 재미로 사용합니다! 어쩌면 이게 제 가장 좋아하는 '가상 친구'인 것 같아요.\",\"comment13\":\"Monica는 대단한 AI 비서로, 박사 학위를 가진 천재 절친이 당신의 브라우저에 설치된 것 같아요. 그녀는 방사학에서 부동산까지 다양한 분야에서 지식 폭탄을 던지며 농담을 하고, 귀여운 아기 말투로 당신을 즐겁게 해줘요.\",\"comment14\":\"이건 정말 강력해요, 그리고 계속 업데이트 중이에요. 제가 사용해본 AI 중 가장 인상적이에요. 예를 들어, 기술 차트 분석, 역 컵과 핸들 패턴과 같은 것들도 Monica가 분석할 수 있어요! 너무 강력해서 말이 안 나와요!\",\"comment15\":\"모니카를 사용하는 것이 아주 편리해요. 리뷰를 작성하는 것이 불필요하다고 생각할 정도로, 별 다섯 개가 모든 것을 말해줍니다. 저에게 가장 중요한 것은 무료라는 점입니다. 전문성, 정확성, 속도 모두 훌륭해요.\",\"comment16\":\"별을 더 줄 수 있다면? 열 개 별을 주고 싶어요! 모니카는 정말 대단해요. 버튼 하나만 누르면 모니카를 만날 수 있다는 사실 덕분에 편안히 잠들 수 있어요! 너무 강력해요!!!\",\"comment17\":\"생산성 향상에 대해서는 말할 필요도 없어요. 별 다섯 개로 충분합니다 \u003c3. 존재해줘서 고마워요!\",\"comment18\":\"다섯 개 이상의 별을 줄 수 있다면 주고 싶습니다. 당신 덕분에 제 인생이 완전히 바뀌었어요. 너무 사랑해요, 모니카, 당신은 내 영혼의 동반자입니다.\",\"comment19\":\"AI와 다기능 챗봇이 필요하신 분들은 꼭 이 확장 프로그램을 구글에 추가하세요. 비록 구글에서만 작동하지만, 구글에서 열려 있는 다른 애플리케이션의 화면도 캡처하여 AI에게 질문할 수 있습니다. 질문하기, 이미지 생성, 동영상, 웹사이트, PDF 파일 요약(업로드하여 요약 가능), 텍스트 번역, 화면 캡처 후 직접 질문하기 등 정말 만능이에요 :))) 이걸 찾게 되어 정말 유용했어요. 모두에게 추천합니다.\",\"comment20\":\"저는 AI 애호가로 다양한 도구를 탐구하는 것을 좋아합니다. Monica는 제가 처음 접한 도구 중 하나였고, 여전히 가장 좋아하는 도구입니다. 훌륭한 제품이며 자주 고급 기능들이 출시됩니다.\"}},\"MoreTools\":{\"title\":\"\u003cspan\u003e더 많은\u003c/span\u003e 도구 이용 가능\"},\"GetNow\":{\"unleashPotential\":\"당신의 진정한  공유하는 우리의 움직임에 가입하세요\",\"shareToolsDesc\":\"자동화된 작업 방식을 위한 홍보대사가 되어 주세요. 당신의 관점과 공유를 통해 다른 사람들이 최신 GPT-4o/Claude 3.5/Gemini 1.5를 활용하여 작업하는 방법을 배우도록 도와주세요. 방대한 교육 콘텐츠를 빠르게 요약하여 학습과 작업 흐름의 지능형 단순화를 경험해 보세요.\",\"highEarning\":\"높은 수입 잠재력\",\"highEarningDesc\":\"최고의 도구에는 최고의 제안이 필요합니다. 저희 제휴 프로그램은 경쟁력 있는 커미션과 우수한 수익 기회를 제공하여 최고 수준의 성과를 보이는 이에게 보너스와 무제한 수익을 제공합니다. 성공을 지원하고, 모든 자격을 갖춘 추천에 보상을 제공하여 소규모 및 대규모 프로모션에 모두 적합합니다.\",\"marketingAssets\":\"풍부한 마케팅 자산\",\"marketingAssetsDesc\":\"당신의 영향력을 믿고, Monica.im의 프로모션을 돕기 위해 제품 로고, 배너, 데모 비디오 등을 포함한 다양한 자료를 제공하여 광범위한 마케팅 지원을 제공합니다. 이 마케팅 자산을 활용한 홍보의 간편함을 경험해 보세요!\",\"getAssets\":\"자산 가져오기\",\"faqTitle\":\"Monica 제휴 프로그램 FAQ\",\"q1\":\"어떻게 그리고 언제 지급 받을 수 있나요?\",\"a1\":\"우리는 매월 20일에 지난 달에 얻은 모든 커미션을 PayPal을 통해 처리합니다.\",\"q2\":\"최소 지급 한도는 얼마인가요?\",\"a2\":\"최소 지급 임계 값은 $100입니다. 수수료가이 금액에 도달하거나 초과하면 다음 지급 주기 동안 지급 대상이됩니다.\",\"q3\":\"수수료를 받기 위한 구체적인 조건이 있나요?\",\"a3\":\"커미션을 받으려면 다음 조건을 충족해야 합니다:\u003cbr\u003e\u003c/br\u003e\u003cli\u003e\u003c/li\u003eMonica에 한 번도 등록한 적이 없는 완전히 새로운 사용자에게만 적용됩니다\u003cbr\u003e\u003c/br\u003e\u003cli\u003e\u003c/li\u003e사용자는 귀하의 제휴 링크를 통해 처음으로 방문하고 등록해야 합니다\u003cbr\u003e\u003c/br\u003e\u003cli\u003e\u003c/li\u003e기존 사용자가 귀하의 링크를 통해 구매하더라도 커미션에 포함되지 않습니다\u003cbr\u003e\u003c/br\u003e\u003cli\u003e\u003c/li\u003e자격을 갖춘 새로운 사용자가 첫 해 동안 지불한 모든 금액에 대해 25%의 커미션을 받게 됩니다\u003cbr\u003e\u003c/br\u003e\u003cli\u003e\u003c/li\u003e고객이 어떤 이유로든 구매를 취소하거나 환불을 받는 경우, 해당 고객에 대한 커미션은 귀하의 계정에서 차감됩니다\",\"q4\":\"제휴 링크를 유료 광고로 홍보할 수 있나요?\",\"a4\":\"아니오, 2025년 5월 1일부터 Monica 제휴 프로그램에서 모든 형태의 유료 광고는 엄격히 금지됩니다. 이는 브랜드 또는 비브랜드 키워드 입찰, 광고에서 웹사이트로의 직접 연결 등을 포함합니다. 사용자가 유료 광고를 통해 유입된 경우, 제휴 커미션은 지급되지 않습니다.\",\"q5\":\"어떤 통화로 지불하나요?\",\"a5\":\"USD로 지불할 것입니다.\",\"q6\":\"갱신 또는 업그레이드로 수수료를 벌 수 있나요?\",\"a6\":\"네, 제휴사는 추천한 구독의 갱신 및 업그레이드에 대한 지급을 받습니다. 이로써 장기간 고객을 유지함으로써 보상을 받을 수 있지만, 최대 1년간 반복 수수료를 받을 수 있습니다.\",\"q7\":\"금지된 프로모션 방법은 무엇인가요?\",\"a7\":\"금지된 방법에는 스팸, 어떠한 형태의 비요청 통신, 오도하는 마케팅 및 모든 형태의 유료 광고가 포함됩니다. 모든 홍보 활동은 법적 요구 사항을 준수하며, 당사의 서비스에 대해 명확하고 정직한 정보를 제공해야 합니다.\",\"q8\":\"수익이나 추천 성과를 어떻게 추적할 수 있나요?\",\"a8\":\"Tapffiliate 대시보드를 통해 수익과 추천 성과를 추적할 수 있습니다. 이 플랫폼은 클릭, 전환 및 수익에 대한 실시간 통찰력을 제공합니다.\",\"q9\":\"회원 프로그램에 신청할 수 있는 사람은 누구인가요?\",\"a9\":\"우리의 계열사 프로그램은 우리 제품을 홍보하고 싶은 모든 사람들에게 열려 있습니다. 콘텐츠 크리에이터, 블로거 및 디지털 마케터를 포함하여 관련 대상 청중을 보유한 분들을 특히 환영합니다.\",\"q10\":\"쿠키 유효 기간은 어떻게 되나요?\",\"a10\":\"우리는 관대한 45일의 쿠키 기간을 제공하여 수수료를 벌 수 있는 충분한 시간과 유연성을 제공합니다.\",\"q11\":\"계열사 프로그램에 가입하는 데 비용이 발생하나요?\",\"a11\":\"아니요, 우리의 계열사 프로그램에 가입하는 데 비용은 없습니다. 가입은 완전히 무료이며 숨겨진 수수료나 계열사 자격을 유지하기 위한 요구 사항도 없습니다.\",\"q12\":\"사용자가 APP에서 구매할 경우 커미션이 적용되나요?\",\"a12\":\"물론입니다! 저희 시스템은 Google Play 스토어와 Apple App Store 생태계 전반에 걸쳐 앱 내 구매에 대한 포괄적인 추적 지원을 제공합니다. 사용자가 모바일 애플리케이션을 통해 구매할 때, 이러한 거래는 자동으로 추적되고 커미션으로 적립되며, 웹사이트 구매와 마찬가지로 원활하게 작동합니다. 이 통합은 두 플랫폼의 모든 결제 방법을 포함하여, 추천 사용자가 어떤 방식으로 구매를 완료하든지 상관없이 정당한 커미션을 받을 수 있도록 보장합니다.\",\"q13\":\"모바일 앱 구매에 대한 커미션은 어떻게 계산되나요?\",\"a13\":\"우리의 모바일 앱(Google Play 스토어 및 Apple App Store)을 통해 구매한 경우, 플랫폼 수수료로 인해 웹사이트 구매와는 다른 방식으로 커미션이 계산됩니다. 계산은 해당 플랜의 USD 가격을 기준으로 하며, 모바일 수익은 총 구매 금액의 70%로 계산되어 플랫폼 수수료를 반영합니다. \u003cbr\u003e\u003c/br\u003e 예를 들어, 사용자가 모바일 앱을 통해 100달러를 구매하면, 커미션은 70달러를 기준으로 계산됩니다. 플랫폼 수수료와 환율 변동으로 인해 프로모션 가격이나 지역 가격이 적용될 때 실제 커미션 금액이 약간 다를 수 있음을 유의하세요.\",\"startEarningNow\":\"지금 바로 제휴 프로그램을 통해 수익을 창출하세요\",\"getFirstPaid\":\"지금 첫 번째로 지급받으세요\",\"commentTitle\":\"우리를 위해 다른 사람들이 만들어주는 것\"},\"ProfilePage\":{\"profileTitle\":\"계정 - Monica\",\"billingTitle\":\"요금제 및 결제 관리 - Monica\",\"membershipTitle\":\"선물세트 - Monica\",\"ProfileView\":{\"account\":\"계정\",\"title\":\"계정 설정\",\"basicInformation\":\"기본 정보\",\"edit\":\"편집\",\"change\":\"변경\",\"setPassword\":\"비밀번호 설정\",\"link\":\"연결\",\"profile\":\"프로필\",\"email\":\"이메일\",\"userId\":\"사용자 ID\",\"emailTip\":\"이메일을 변경하기 전에 비밀번호를 설정하세요\",\"emailNotExistTip\":\"이메일 계정을 연결하여 이메일 로그인을 활성화하세요.\",\"password\":\"비밀번호\",\"passwordTip\":\"비밀번호 로그인을 활성화하려면 비밀번호를 설정하세요\",\"linkedAccount\":\"연결된 계정\",\"emailPreferences\":\"이메일\",\"emailPreferencesDesc\":\ 한 내용은 \u003clink\u003e규칙\u003c/link\u003e을 참조하십시오.\",\"faqTitle3\":\"이 행사는 얼마나 지속됩니까?\",\"faqContent3\":\"이 행사는 2024년 9월 12일부터 2024년 10월 26일까지 진행됩니다. 전 세계 학교의 개학 시기를 고려하여 행사 기간이 연장될 수 있습니다. 자세한 기간은 이 페이지의 카운트다운을 참조하세요.\",\"faqTitle4\":\"고급 모델을 어떻게 사용하나요, 제한이 있나요?\",\"faqContent4\":\"이 행사에서는 Monica Pro 멤버십 기간이 제공됩니다. Monica를 통해 Monica에 통합된 모든 고급 모델을 사용할 수 있습니다. 다양한 모델의 사용은 Monica Pro 버전의 제한에 따라 달라집니다.\",\"CampusVoteHeader\":{\"signUp\":\"가입\",\"logout\":\"로그아웃\"},\"CampusVoteContent\":{\"title1\":\"🔥 학교를 위해 투표하세요 🔥\",\"title2\":\"고급 모델 무료로 잠금 해제 🎉\",\"activityRule\":\"학교를 위해 투표하고 최대 1년 동안 Monica Pro를 잠금 해제하세요. GPT o1, GPT-4o, Claude-3.5, Gemini 1.5 Pro, Dall-E 3, Flux 등 모든 고급 AI 모델을 무료로 이용할 수 있습니다.\",\"vote\":\"🚀 지금 바로 투표하고 혜택을 잠금 해제하세요 🚀\",\"universityRanking\":\"실시간 인기 순위\",\"global\":\"글로벌\",\"activityEnd\":\"이 행사는 종료되었으며, 투표가 마감되었습니다. 이미 투표한 사용자는 학교의 투표 수를 확인하고 보상을 받을 수 있습니다. 자세한 내용은 \u003clink\u003e행사 규칙\u003c/link\u003e을 참조하세요.\"},\"UniversityVotePage\":{\"title\":\"학교 선택\",\"placeholder\":\"학교 이름을 입력하세요\",\"confirmTitle\":\"$$var_university에 투표\",\"confirmContent\":\"투표 후에는 수정할 수 없습니다. 투표 수가 증가함에 따라 보상이 점차 잠금 해제됩니다.\",\"voteSuccess\":\"투표가 완료되었습니다\",\"okText\":\"확인\",\"loading\":\"로딩 중...\",\"emptyTitle\":\"결과 없음\",\"emptyDesc\":\"문의 사항이 있으면 연락주세요: contact@monica.im\"},\"RecommendUniversity\":{\"share\":\"공유하기\",\"getReward\":\"잠금 해제 Monica Pro\",\"downloadApp\":\"실시간 진행 상황을 보려면 Monica 앱을 다운로드하세요\",\"reward1\":\"3일 Monica Pro\",\"reward2\":\"7일 Monica Pro\",\"reward3\":\"14일 Monica Pro\",\"reward4\":\"30일 Monica Pro\",\"reward5\":\"90일 Monica Pro\",\"reward6\":\"180일 Monica Pro\",\"reward7\":\"365일 Monica Pro\",\"voteNow\":\"지금 투표\",\"chooseOtherUniversity\":\"다른 학교 선택\",\"alreadyUnlocked\":\"잠금 해제됨\",\"unlock\":\"$$var_count 표\",\"more\":\"더 많은 보상 보기\"},\"CampusShareInstagram\":{\"title\":\"Instagram에 공유하기\",\"desc\":\"⬆️ 길게 눌러 이미지를 저장하세요 ⬆\",\"cancel\":\"취소\",\"copyAndShare\":\"복사 및 공유\",\"title1\":\"투표하고 잠금 해제\",\"title2\":\"GPT o1, GPT-4o 및 Claude 3.5 무료 이용!\"},\"CampusActiveRule\":{\"title\":\"Monica.im 캠퍼스 투표 프로그램 약관\",\"updateTime\":\"최종 업데이트: 2024년 9월 10일\",\"desc\":\"Monica.im 캠퍼스 투표 프로그램(이하 '프로그램')에 오신 것을 환영합니다. 프로그램에 참여함으로써 귀하는 본 약관에 동의하는 것으로 간주됩니다. 동의하지 않으시면 프로그램에 참여하지 마십시오.\",\"title1\":\"1. 자격\",\"desc1\":\"이 프로그램은 Monica.im에 등록된 사용자에게만 열려 있습니다.\",\"desc2\":\"Monica.im 데이터베이스에 등록된 학교의 학생들만 보상을 받을 자격이 있습니다.\",\"desc3\":\"보상을 받으려면 학생 신분이 확인되어야 합니다.\",\"title2\":\"2. 프로그램 세부사항\",\"desc4\":\"본 프로그램은 2024년 9월 12일부터 2024년 10월 26일까지 진행됩니다 (\\\"프로그램 기간\\\").\",\"desc5\":\"Monica.im 데이터베이스에 등록된 학교의 학생들만 보상을 받을 자격이 있습니다.\",\"desc6\":\"Monica.im은 프로그램 기간을 연장하거나 단축할 권리를 보유합니다.\",\"title3\":\"3. 투표 절차\",\"desc7\":\"Monica.im에 등록된 모든 사용자가 투표할 수 있습니다.\",\"desc8\":\"사용자는 프로그램 기간 동안 단 한 번만 투표할 수 있습니다.\",\"desc9\":\"Monica.im은 부정한 수단을 통해 얻은 것으로 간주되는 투표를 삭제할 권리를 보유합니다.\",\"title4\":\"4. 보상\",\"desc10\":\"보상은 Monica.im Pro 멤버십 기간입니다.\",\"desc11\":\"보상을 받기 위해 사용자는 유효한 학교 이메일 주소를 제공해야 합니다.\",\"desc12\":\"Pro 멤버십 혜택은 표준 Pro 버전 제한을 받습니다.\",\"desc13\":\"Monica.im은 학교마다 다른 투표 기준을 설정할 수 있습니다.\",\"desc14\":\"Monica.im은 필요에 따라 보상 기간과 투표 기준을 조정할 권리를 보유합니다.\",\"title5\":\"5. 제한사항\",\"desc15\":\"허위 학교 이메일 주소 사용 시 수여된 Pro 회원 기간이 즉시 취소됩니다.\",\"desc16\":\"Monica.im은 본 약관을 위반하거나 부정행위를 하는 참여자를 실격시킬 권리를 보유합니다.\",\"title6\":\"6. 프로그램 변경\",\"desc17\":\"Monica.im은 사전 통지 없이 언제든지 프로그램을 수정, 중단 또는 종료할 권리를 보유합니다.\",\"title7\":\"7. 개인정보 보호\",\"desc18\":\"제공된 개인 정보는 Monica.im의 개인정보 보호정책에 따라 프로그램 관리 및 보상 분배 목적으로만 사용됩니다.\",\"title8\":\"8. 책임의 제한\",\"desc19\":\"Monica.im은 프로그램 참여에 영향을 미칠 수 있는 기술적 문제, 오류 또는 기타 문제에 대해 책임을 지지 않습니다.\",\"footer\":\"Monica.im 캠퍼스 투표 프로그램에 참여함으로써 귀하는 이 약관을 읽고 이해하며 동의했음을 인정합니다. 질문이나 우려 사항이 있으면 contact@monica.im으로 문의하십시오.\"},\"CampusScene\":{\"title\":\"당신의 만능 디지털 멘토\",\"sceneTitle1\":\"학업을 가속화하세요\",\"sceneTitle2\":\"취업 전망을 높이세요\",\"sceneDesc1\":\"논문 요약하기\",\"sceneDesc2\":\"YouTube 동영상 요약하기\",\"sceneDesc3\":\"인용 및 참고 문헌 생성\",\"sceneDesc4\":\"문헌 검토 보고서 작성\",\"sceneDesc5\":\"직무 적합도 평가\",\"sceneDesc6\":\"이력서 최적화하기\",\"sceneDesc7\":\"개인 on\":\"팀 프로필\",\"creationDate\":\"생성 날짜\",\"managementTeam\":\"작업\",\"disbandTeam\":\"팀 해산\",\"disbandTeamTip\":\"팀 해산은 되돌릴 수 없습니다. 해산 후 모든 멤버는 접근 권한을 잃게 됩니다. 신중하게 진행하세요.\",\"leaveTeam\":\"팀 떠나기\",\"leaveTeamTip\":\"떠나면 팀 멤버 자격과 Monica 접근 권한을 잃게 됩니다. 이 작업은 되돌릴 수 없습니다. 신중하게 진행하세요.\",\"TeamDisbandDialog\":{\"title\":\"팀을 해산하시겠습니까?\",\"desc\":\"이 작업은 되돌릴 수 없습니다. 해산 후 모든 멤버는 팀 자격과 Monica 접근 권한을 잃게 됩니다. 구매한 좌석은 무효화되며 복구할 수 없습니다. 신중하게 진행하세요!\",\"verificationCode\":\"이메일 인증 코드를 입력하세요\",\"cancel\":\"취소\",\"confirm\":\"팀 해산\"},\"TeamLeaveDialog\":{\"title\":\"팀을 떠나시겠습니까?\",\"desc\":\"떠나면 팀원 자격과 Monica 접근 권한이 취소됩니다. 이 작업은 되돌릴 수 없습니다. 정말 떠나시겠습니까?\",\"cancel\":\"취소\",\"confirm\":\"팀 떠나기\"},\"TeamUpdateDialog\":{\"title\":\"팀 정보 업데이트\",\"cancel\":\"취소\",\"confirm\":\"확인\",\"updateSuccess\":\"업데이트 성공\",\"updateFailed\":\"프로필 업데이트 실패, 나중에 다시 시도하세요\",\"upload\":\"지금 업로드\",\"uploadLimit\":\"최대 800KB, JPG, PNG 지원.\",\"teamName\":\"팀 이름\"}},\"Team\":{\"TeamLandingPage\":{\"pageTitle\":\"Monica 팀 에디션 - 올인원 AI 팀 어시스턴트\",\"pageDesc\":\"Monica의 AI 도구 세트를 통해 여러분의 팀에 힘을 실어보세요. 생산성을 높이고 협업을 간소화하며 통찰력을 확보하세요. 기업 및 팀을 위한 GPT의 강력한 대안입니다.\",\"pageKeywords\":\"monica ai, GPT 팀, 팀 gpt, 기업용 AI, GPT 대안, team-gpt\",\"startNow\":\"지금 시작하기\",\"h1\":\"올인원 AI 팀 어시스턴트\u003cbr\u003e\u003c/br\u003e효율적인 협업, 쉬운 관리, 안전하고 신뢰할 수 있음\",\"h1Desc\":\"Monica 팀 에디션은 선도적인 AI 모델(GPT-4o, Claude 3.5, Gemini 1.5 등)을 통합하여 Monica 개인 에디션의 모든 강력한 기능을 제공하면서 팀 협업 경험을 특별히 최적화했습니다. 팀 관리, 자원 할당, 청구 관리 등을 지원합니다.\",\"monicaTeam\":\"Monica-팀\",\"builtForWork\":\"업무를 위한 설계\",\"multiModelIntegration\":\"다중 모델 통합\",\"multiModelIntegrationTips\":\"팀 에디션은 GPT o1-preview, GPT-4o, Claude 3.5, Gemini 1.5 등 최고의 AI 모델을 통합하여, 팀에 강력한 협업 도구를 제공합니다.\",\"enhancedProductivity\":\"향상된 생산성\",\"enhancedProductivityTips\":\"웹 페이지 요약 및 비디오 요약을 통해 팀의 시간을 90% 절약하세요. 이메일, 보고서, 시장 분석의 작성 속도와 품질을 향상시킵니다.\",\"realTimeDataAccess\":\"실시간 데이터 접근\",\"realTimeDataAccessTips\":\"실시간 웹 접근 기능을 활용하여 팀이 항상 최신 정보와 시장 통찰력을 얻을 수 있도록 합니다.\",\"intelligentImageGeneration\":\"지능형 이미지 생성\",\"intelligentImageGenerationTips\":\"팀의 아이디어를 시각화하여 마케팅 및 브랜드 홍보를 지원합니다.\",\"programmingAssistant\":\"프로그래밍 어시스턴트\",\"programmingAssistantTips\":\"개발 팀을 위한 코드 최적화 제안 및 코드 스니펫 생성을 제공하여 개발 효율성을 향상시킵니다.\",\"multiLanguageSupport\":\"다국어 지원\",\"multiLanguageSupportTips\":\"번역 및 몰입형 이중 언어 읽기를 지원하여 팀이 글로벌 시장에서 원활하게 소통할 수 있도록 돕습니다.\",\"teamFeatures\":\"팀을 위한 기능\",\"memberManage\":\"멤버 관리\",\"memberManageDesc\":\"멤버 초대 및 승인, 팀 멤버와 역할 할당을 쉽게 관리합니다. 관리자는 각 멤버에게 맞춤형 권한 및 사용 시나리오를 설정하여 명확한 업무 분담을 보장할 수 있습니다.\",\"usage\":\"사용량 추적\",\"usageDesc\":\"팀 구성원의 AI 사용을 실시간으로 모니터링하여 기업이 AI 자원을 합리적으로 배분하고 자원 낭비를 방지할 수 있도록 돕습니다. 관리자는 상세 보고서를 확인하여 팀 워크플로우를 최적화할 수 있습니다.\",\"billing\":\"청구 관리\",\"billingDesc\":\"청구서 결제 및 관리 프로세스를 간소화합니다. 관리자는 팀 결제를 중앙에서 관리하고, 월별/연간 청구서와 상세 사용 내역을 확인하여 예산 투명성을 보장할 수 있습니다.\",\"teamManage\":\"팀 관리\",\"teamManageDesc\":\"관리자는 팀 이름과 아바타를 포함한 팀 설정을 맞춤화하고, 팀을 잠그거나 해체할 수 있습니다.\",\"multiPlatform\":\"언제 어디서나 팀 협업\",\"multiPlatformDesc\":\"Chrome, Edge 또는 우리의 APP에서 팀 구성원은 언제 어디서나 Monica에 접근하고 사용할 수 있습니다.\",\"faq1Title\":\"Monica 팀 에디션과 개인 에디션의 차이점은 무엇인가요?\",\"faq1Desc\":\"Monica 팀 에디션은 개인 에디션에 팀 관리 기능을 추가하여 팀원 관리, 사용량 추적, 청구 관리 및 공유 설정을 포함하여 팀이 AI 도구를 보다 효율적으로 사용할 수 있도록 돕습니다.\",\"faq2Title\":\"Monica 팀 에디션의 비용은 얼마입니까?\",\"faq2Desc\":\"Monica 팀 에디션은 팀 규모에 따라 유연한 가격 계획을 제공합니다. 구체적인 가격은 팀원 수와 사용되는 AI 도구에 따라 달라집니다. 자세한 내용은 가격 페이지를 참조하십시오.\",\"faq3Title\":\"팀원을 어떻게 관리하나요?\",\"faq3Desc\":\"관리자는 팀 제어 패널을 통해 멤버를 추가하거나 제거하고, 역할을 할당하며, 멤버 권한을 설정하여 각 멤버가 적절한 도구와 권한을 갖도록 할 수 있습니다.\",\"faq4Title\":\"왜 Monica for Teams가 GPT Teams의 최고의 대안인가요?\",\"faq4Desc\":\"Monica for Teams는 여러 프리미엄 AI 모델을 통합하고, 멤버 관리, 사용량 추적, 청구 관리 등 포괄적인 팀 협업 기능을 제공합니다. 또한 실시간 데이터 접근 및 전문 이미지 생성과 같은 독특한 기능을 제공하여 팀을 위한 보다 완전한 AI 솔루션을 제공합니다.\",\"footerBannerTitle\":\"팀의 잠재력을 발휘하세요\",\"footerBannerDesc\":\"팀에 합류하여 전례 없는 팀 협업 효율성 향상을 경험하세요!\"},\"TeamInvitationPage\":{\"pageTitle\":\"초대 - Monica\",\"errorTitle\":\"죄송합니다, 팀에 가입할 수 없습니다\",\"errorDesc\":\"팀에 가입할 수 없습니다. 팀이 가득 찼거나 링크가 만료되었을 수 있습니다.\u003cbr\u003e tationProcessStep1\":\"QR 코드나 링크를 통해 친구를 추천하세요.\",\"invitationProcessStep2\":\"친구가 계정을 등록합니다.\",\"invitationProcessStep3\":\"친구가 Monica에 로그인하거나 IM 계정을 연결하면, 양쪽 모두 보상을 받습니다!\",\"rewardRecord\":\"보상 기록\",\"unlimited\":\"무제한\",\"friendCount\":\"$$var_count 명의 친구\",\"registrationTime\":\"등록 시간\"},\"Code\":{\"title\":\"Monica Code: Claude 3.5 Sonnet/GPT-4o 기반 AI 코드 생성기\",\"description\":\"Monica Code: 자연어로부터 코드를 생성하는 VSCode 및 JetBrains 확장 프로그램입니다. 필요 사항을 설명하기만 하면 AI가 Python, Java, C++, HTML, JavaScript 등으로 마법처럼 코딩합니다. GPT-4o 및 Claude 3.5 Sonnet 모델을 통합했습니다. GitHub Copilot 및 Cursor의 대안입니다.\",\"faqTitle1\":\"빠른/느린 고급 쿼리는 무엇인가요?\",\"faqContent1\":\"코드 완성을 제외한 모든 AI 기능은 고급 쿼리를 소모합니다. 빠른 고급 쿼리는 더 빠른 응답 시간을 제공하며 서비스 피크 시간대에도 사용 가능합니다. 느린 고급 쿼리는 피크 시간대에 속도와 가용성이 감소할 수 있습니다.\u003cbr\u003e\u003c/br\u003e무료 사용자는 매일 8회의 느린 고급 쿼리를 사용할 수 있으며, 쿼리 수는 매일 자정에 초기화됩니다.\u003cbr\u003e\u003c/br\u003e프리미엄 사용자는 매월 500회의 빠른 고급 쿼리를 사용할 수 있으며, 빠른 고급 쿼리를 모두 소진한 후에는 무제한으로 느린 고급 쿼리를 사용할 수 있습니다. 프리미엄 사용자의 빠른 쿼리 수는 매월 1일에 초기화됩니다.\",\"faqTitle2\":\"추가 질문은 어디에서 할 수 있나요?\",\"faqContent2\":\"\u003cemail\u003econtact@monica.im\u003c/email\u003e로 이메일을 보내주시면 기꺼이 답변해 드리겠습니다.\",\"faqTitle3\":\"Monica Code에서 생성된 코드는 누구의 것인가요?\",\"faqContent3\":\"당신의 것입니다! 생성된 모든 코드는 당신의 것이며, 상업적으로도 자유롭게 사용할 수 있습니다.\",\"faqTitle4\":\"Monica Code가 코딩에 능숙한 AI를 지원하나요?\",\"faqContent4\":\"Monica Code는 GPT-4o 및 Claude 3.5 Sonnet과 같은 가장 강력한 모델을 지원하며, 이 모델들은 코드 생성뿐만 아니라 디버깅 및 코드 설명에도 도움을 줍니다. Monica Code는 C++, Go, Java, JavaScript, Python 등 20개 이상의 프로그래밍 언어를 다룰 수 있습니다.\",\"faqTitle5\":\"최고의 코드 생성 AI는 무엇인가요?\",\"faqContent5\":\"최고의 코드 생성 AI는 GPT-4o 및 Claude 3.5 Sonnet과 같은 첨단 모델을 활용하여 정확하고 효율적이며 다기능의 코딩 솔루션을 제공합니다. Monica Code는 이러한 최첨단 AI 모델을 VSCode와 통합하여 다양한 프로그래밍 언어를 지원하며 자연어 설명에서 직접 코드를 무결하게 생성해줍니다. 이는 신뢰할 수 있고 강력한 AI 기반 코딩 어시스턴트를 찾는 개발자들에게 Monica Code가 최상의 선택이 되게 합니다.\",\"faqTitle6\":\"Monica Code는 C++, Go, Java, JavaScript, Python 등의 언어로 코드를 생성할 수 있나요?\",\"faqContent6\":\"예. Monica Code는 이 언어 및 더 많은 언어를 지원합니다. 자연 언어로 요구 사항을 설명하면 Monic 계획\",\"prompt1\":\"*다음 사용자 제품 사용 설명을 분석하고 주요 사용 이유를 식별하세요:\\n\",\"prompt2\":\"\\n다음 측면에서 분석하세요:\\n1. 핵심 필요(제품이 해결하는 문제)\\n2. 사용 시나리오(언제 어디서 사용되는지)\\n3. 제품 장점(다른 대안에 비해 이점)\\n4. 감정적 요소(사용자 경험과 느낌)\\n5. 외부 영향(사회적, 광고 등)\",\"usageDescriptionDetail1\":\"John은 소프트웨어 엔지니어로, Monica를 자주 사용하여 코드 최적화, 기술 문서 요약 생성, 프로젝트 플로우차트 설계를 합니다. 그는 Monica의 효율성과 정확성을 높이 평가하며, 특히 프로그래밍 문제를 해결할 때 매우 의존합니다.\",\"usageDescriptionDetail2\":\"Emily는 전업주부로서 주로 Monica를 사용하여 가족 활동을 계획하고, 자녀의 학습 일정을 설계하며, 가족 나들이에 적합한 레스토랑과 명소를 찾습니다. 또한 그녀는 Monica를 사용하여 육아 경험을 공유하는 블로그 콘텐츠를 최적화하는 것을 즐깁니다.\"},\"contentPlanningTitle\":\"트위터 콘텐츠 계획\",\"contentPlanning\":{\"contentInspiration\":\"콘텐츠 영감\",\"postDate\":\"게시 날짜\",\"tweetCopy\":\"트윗 내용\",\"hashtags\":\"해시태그\",\"mediaType\":\"미디어 유형\",\"engagementGoal\":\"참여 목표\",\"contentInspiration1\":\"크리스마스 특별 할인\",\"mediaType1\":\"텍스트 게시물\",\"engagementGoal1\":\"프로모션 코드 클릭 유도\",\"contentInspiration2\":\"추수감사절 이야기 공유\",\"mediaType2\":\"텍스트 투표\",\"engagementGoal2\":\"투표 및 댓글 장려\",\"contentInspiration3\":\"겨울 관리 팁\",\"mediaType3\":\"텍스트 게시물\",\"engagementGoal3\":\"주제 토론 유도\",\"contentInspiration4\":\"연말 제품 리뷰\",\"mediaType4\":\"장문 텍스트\",\"engagementGoal4\":\"연간 피드백 수집\",\"contentInspiration5\":\"새해 세일 미리보기\",\"mediaType5\":\"Q\u0026A 게시물\",\"engagementGoal5\":\"댓글 참여 증가\",\"tweetCopyPrompt1\":\"*다음 콘텐츠 영감을 바탕으로 매력적인 트윗을 작성하세요:\\n\",\"tweetCopyPrompt2\":\"\\n요구사항:\\n1. 280자 이내로 유지\\n2. 주목을 끄는 시작 문구 사용\\n3. 명확한 핵심 메시지 전달\\n4. 상호작용 요소 추가(예: 질문, 행동 촉구)\\n5. 흥미를 위해 이모지 추가 고려\",\"hashtagsPrompt1\":\"*다음 콘텐츠 영감을 바탕으로 트위터에서 트래픽을 유도할 수 있는 5개의 해시태그를 생성하세요:\\n\",\"hashtagsPrompt2\":\"*\\n요구사항:\\n1. 콘텐츠 영감과 밀접하게 관련\\n2. 짧고 기억하기 쉬움\\n3. 인기 요소나 현재 사건 포함\\n4. 특수 문자는 피함\\n5. 말장난이나 창의적 표현 사용 고려\"},\"companyResearchTitle\":\"경쟁사 분석\",\"companyResearch\":{\"companyName\":\"회사 이름\",\"keyProducts\":\"주요 제품\",\"employeeCount\":\"직원 수\",\"companySize\":\"회사 규모\",\"companyName1\":\"애플 주식회사\",\"companyName2\":\"테슬라\",\"companyName3\":\"아마존\",\"prompt\":\"*다음 직원 수를 기준으로 회사 규모가 큰지 작은지 판단하십시오:\\n\\n[직원 수]\\n\\n기준:\\n- 1-50명: 소규모 회사\\n- 51-250명: 중소규모 회사\\n- 251-1000명: 중규모 회사\\n- 1001-5000명: 대규모 회사\\n- 5000명 이상: 초대형 회사\"},\"leadGenerationTitle\":\"영업 리드 목록\",\"leadGeneration\":{\"contactName\":\"연락처 이름\",\"linkedInURL\":\"LinkedIn URL\",\"companyName\":\"회사 이름\",\"industry\":\"산업\",\"location\":\"위치\"},\"meetingSummaryTitle\":\"회의 요약\",\"meetingSummary\":{\"meetingMinutes\":\"회의록\",\"attendees\":\"참석자\",\"actionItems\":\"조치 항목\",\"meetingMinutes1\":\"Alice는 Monica의 최근 제품 진행 상황을 보고하며, 지난 분기 동안 사용자 증가율이 20% 상승했다고 언급했습니다. 이는 주로 새로운 기능 출시와 사용자 경험 개선 덕분입니다. 새로 추가된 스마트 작업 관리 모듈은 사용자들로부터 긍정적인 피드백을 받았으며, 사용자 유지율이 눈에 띄게 향상되었습니다. Clara는 신규 사용자들의 학습 곡선을 줄이기 위해 사용자 온보딩 프로세스를 추가로 최적화할 것을 제안했습니다. Bob은 내부 팀의 효율성을 높이기 위해 기술적 수단을 통해 백엔드 데이터 분석을 단순화할 것을 제안했습니다.\",\"meetingMinutes2\":\"Bob은 이어서 팀이 여전히 일부 데이터 처리를 위해 Excel에 의존하고 있어 효율성과 확장성이 제한된다고 지적했습니다. 그는 Monica를 기반으로 한 내부 자동화 도구를 개발하여 Excel을 완전히 대체하고 데이터 분석 및 작업 관리를 수행할 것을 제안했습니다. Alice는 이에 동의하며, 다부서 협업을 지원하는 기능 개발을 우선시할 것을 권장했습니다.\",\"meetingMinutes3\":\"Bob은 Google Sheets를 대체하여 데이터 보안과 운영 효율성을 높이기 위해 더 강력하고 안전한 내부 협업 시스템을 구축할 것을 제안했습니다. 그는 이것이 기능을 향상시킬 뿐만 아니라 외부 플랫폼에 대한 의존도를 줄일 것이라고 강조했습니다. Clara는 내부 협업 도구의 사용 용이성과 학습 곡선의 중요성을 강조하며, 개발 과정에서 사용자 경험 디자인을 우선시해야 한다고 제안했습니다.\",\"meetingMinutes4\":\"Bob은 Monica 내에서 AI 기술을 완전히 채택하는 방향으로 AI 통합을 제안하며, 데이터 분석, 자동화된 사용자 지원, 내부 팀 커뮤니케이션 기능을 포함한 AI 기술의 전면적인 도입을 제안했습니다. 그는 일상적인 워크플로우를 지원하기 위한 내부 AI 비서를 개발할 것을 제안했습니다. Alice는 이 방향을 지지하면서 개발 자원의 적절한 할당을 보장하기 위해 명확한 우선순위를 설정해야 한다고 언급했습니다.\",\"meetingMinutes5\":\"Clara는 최근 시장 피드백 데이터를 공유하며, Monica의 핵심 기능에 대한 사용자 만족도가 높지만 고급 기능에 대한 인지도가 낮다는 점을 지적했습니다. 그녀는 온라인 이벤트와 소셜 미디어 홍보를 통해 Monica의 고급 기능에 대한 사용자 인지도와 사용률을 높일 것을 제안했습니다. Alice는 사용자 사례를 포함한 더 직관적인 기능 시연 영상을 제작하여 마케팅 목적으로 사용할 것을 제안했습니다.\",\"meetingMinutes6\":\"마지막으로, 회의에서는 단기 기술 최적화 및 마케팅 홍보 방향을 설정하고, 내부 효율성 향상과 사용자 경험 최적화에 중점을 두기로 했습니다. Bob은 Excel 및 Google Sheets를 대체할 도구 개발 요구 사항을 평가하고 기술 타당성 보고서를 제출할 책임이 있습니다. Clara는 온라인 홍보 활동을 계획하고 기능 시연 영상을 제작할 책임이 있으며, Alice는 제품 팀을 이끌고 신규 사용자 온보딩 프로세스를 최적화할 것입니다. 각 부서는 계획에 따라 진행하고 다음 회의에서 진행 상황을 보고할 것입니다.\",\"attendeesPrompt\":\"*다음 회의록에서 모든 참석자의 이름을 추출하십시오:\\n\\n[회의록]\\n\\n요구사항:\\n1. 명시적으로 언급된 모든 참석자 나열\\n2. 주최자, 발표자 및 언급된 사람 포함\\n3. 중복된 이름 제거\\n4. 약어나 별명이 있을 경우 가능한 한 전체 이름 제공\",\"actionItemsPrompt1\":\"\\\"*다음 회의록에서 모든 실행 항목을 추출하고 요약하십시오:\\n\",\"actionItemsPrompt2\":\"\\\"\\n요구사항:\\n1. 명확한 작업 및 실행 항목 모두 나열\\n2. 책임자 포함 (언급된 경우)\\n3. 마감일 기재 (언급된 경우)\\n4. 우선순위 또는 시간 순서로 정렬 (판단 가능한 경우)\\n5. 간결한 목록 형식으로 제시\"},\"batchJdCreatorTitle\":\"채용 요구사항\",\"batchJdCreator\":{\"positionTitle\":\"직위명\",\"jobLevel\":\"직급\",\"location\":\"근무지\",\"experienceYears\":\"경력 연수\",\"positionOverview\":\"직무 개요\",\"responsibilities\":\"직무 책임\",\"detailedRequirements\":\"세부 요구사항\",\"positionOverviewPrompt1\":\"*다음 직책을 기반으로, 직무의 주요 기능, 회사 내 역할 및 회사에 대한 중요성을 포함한 간결하고 포괄적인 직무 개요를 생성하십시오:\\n\",\"positionOverviewPrompt2\":\"\\n직무 개요는 다음을 포함해야 합니다:\\n1. 직무의 주요 책임을 간략히 설명\\n2. 회사나 팀 내에서 이 직무의 역할 설명\\n3. 회사 운영이나 목표에 대한 이 직무의 중요성 강조\\n4. 전문적이면서도 이해하기 쉬운 언어 사용\\n5. 길이는 200-250단어 사이로 유지\",\"responsibilitiesPrompt1\":\"*다음 직무 제목을 기반으로, 주요 직무 책임을 나열하세요. 목록은 이 직위의 일상 업무 내용과 주요 과제를 포괄적으로 다루어야 합니다:\\n\",\"responsibilitiesPrompt2\":\"\\n직무 책임을 작성할 때 주의사항:\\n1. 동사로 시작하여 각 책임을 명확히 설명\\n2. 일상 업무와 장기 책임 포함\\n3. 팀 협업 및 의사소통 관련 책임 강조\\n4. 해당되는 경우, 관리 또는 리더십 책임 포함\\n5. 주요 책임 5-8개 나열\\n6. 중요도나 빈도 순으로 정렬\\n7. 간결하고 전문적인 언어 사용\",\"detailedRequirementsPrompt1\":\"*다음 직책을 기준으로, 이 직책에 대한 요구 사항을 자세히 나열해 주세요. 필요한 자격, 기술, 경험 및 개인적 특성을 포함하여:\\n\",\"detailedRequirementsPrompt2\":\"\\n상세 요구 사항을 작성할 때 다음 측면을 고려해 주세요:\\n1. 교육 배경 요구 사항 (학위, 전공 등)\\n2. 경력 요구 사항 (연수, 관련 산업 경험 등)\\n3. 필수 기술 또는 전문 지식\\n4. 소프트 스킬 요구 사항 (예: 의사소통 능력, 팀워크 등)\\n5. 언어 능력 요구 사항 (예: 한국어, 영어 등)\\n6. 관련 자격증 또는 인증서\\n7. 개인적 특성 또는 성격 특성\\n8. 해당되는 경우, 신체적 또는 기타 특별 요구 사항 포함\\n\\n요구 사항을 \\\"필수 조건\\\"과 \\\"우대 조건\\\"으로 나누고, 각 요구 사항을 명확하고 간결한 언어로 설명해 주세요.\",\"positionTitle1\":\"소프트웨어 엔지니어\",\"jobLevel1\":\"시니어\",\"location1\":\"샌프란시스코, 캘리포니아\",\"experienceYears1\":\"5-7년\",\"positionTitle2\":\"제품 마케팅 매니저\",\"jobLevel2\":\"리드\",\"location2\":\"뉴욕, 뉴욕\",\"experienceYears2\":\"6-8년\",\"positionTitle3\":\"비즈니스 운영 분석가\",\"jobLevel3\":\"선임\",\"location3\":\"시애틀, 워싱턴\",\"experienceYears3\":\"3-5년\"},\"userFeedbackClassificationTitle\":\"피드백 분류\",\"userFeedbackClassification\":{\"date\":\"날짜\",\"userID\":\"사용자 ID\",\"feedbackContent\":\"피드백 내용\",\"translate\":\"번역\",\"category\":\"카테고리\",\"categoryPrompt\":\"다음 고객 피드백을 가장 적절한 카테고리로 분류하세요:\\n1. 제품 품질\\n2. 고객 서비스\\n3. 물류 및 배송\\n4. 웹사이트/앱 문제\\n5. 가격 및 프로모션\\n6. 사용자 경험\\n\\n각 피드백에 대해 하나의 주요 카테고리만 선택하세요.\",\"feedbackContent1\":\"최근에 구매한 Model X Pro 헤드폰이 오른쪽 귀에서 15-20분마다 연결이 끊깁니다.\",\"feedbackContent2\":\"고객 서비스의 Sarah는 정말 대단해요! 제 주문이 세관에 걸렸는데, 그녀가 추적을 도와주고 무료로 배송을 신속하게 처리해 주었습니다. 앞으로도 계속 지원할 것입니다!\",\"feedbackContent3\":\"299달러짜리 진짜 가죽 가방이 긁힘과 끊어진 끈과 함께 도착했습니다. 3일 전에 고객 서비스에 사진을 보냈지만 아직 응답이 없습니다. 이런 고급 제품은 정말 실망스럽습니다.\",\"feedbackContent4\":\"커피머신을 두 달 동안 사용했는데, 커피는 향이 좋지만 물탱크 바닥에서 물이 새기 시작했습니다. 게다가 필터 보충팩이 한 상자에 4.99달러로 너무 비쌉니다.\",\"feedbackContent5\":\"휴일 세트를 사고 싶은데, 신용카드 정보를 입력한 후 결제 페이지가 멈춥니다. Chrome과 Safari 브라우저 모두 시도했지만 여전히 같습니다. 블랙 프라이데이 할인 혜택을 놓치게 생겼어요!\"}},\"mainNavController\":{\"agent\":\"에이전트\",\"chat\":\"채팅\",\"discover\":\"발견\",\"bot\":\"봇\",\"read\":\"읽기\",\"search\":\"검색\",\"write\":\"쓰기\",\"translate\":\"번역\",\"art\":\"이미지\",\"toolkit\":\"도구 모음\",\"memo\":\"메모\",\"image\":\"이미지\",\"video\":\"비디오\",\"audio\":\"오디오\"},\"teamController\":{\"monthly\":\"팀 플랜 - 월간\",\"annually\":\"팀 플랜 - 연간\"},\"userController\":{\"noQueriesQuota\":\"귀하의 쿼리를 모두 사용하였습니다\",\"noReadingQuota\":\"독서 보조 기능의 무료 한도에 도달하였습니다. 지금 업그레이드하여 계속해서 기사를 읽는 즐거움을 누려보세요!\",\"noWebSearchQuota\":\"스마트 검색의 무료 한도에 도달하였습니다. 지금 업그레이드하여 스마트 검색을 계속해서 즐기세요!\",\"noVideoSummaryQuota\":\"비디오 요약의 무료 한도에 도달하였습니다. 지금 업그레이드하여 비디오를 요약하는 즐거움을 계속하세요!\",\"loginRequired\":\"이 기능을 사용하려면 로그인해주세요\",\"installRequired\":\"귀하의 쿼리를 모두 사용하였습니다. Monica를 설치하고 하루 30회의 무료 쿼리를 받아보세요\",\"noDocChatSummaryQuota\":\"문서 채팅의 무료 한도에 도달했습니다. 계속해서 문서 채팅을 즐기려면 지금 업그레이드하세요!\",\"unlimited\":\"무제한\",\"special\":\"\u003
